<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회의 달력</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
.header{background:#1e293b;color:white;padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:1.1rem;font-weight:700}
.header-btns{display:flex;gap:8px;align-items:center}
.btn{padding:7px 14px;border:none;border-radius:7px;cursor:pointer;font-size:.82rem;font-weight:600;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.5;cursor:default}
.btn-primary{background:#3B82F6;color:white}
.btn-ghost{background:transparent;color:white;border:1px solid rgba(255,255,255,.3)}
.btn-danger{background:#EF4444;color:white}
.btn-cancel{background:#f1f5f9;color:#374151}
.btn-sm{padding:5px 12px;font-size:.78rem}
.lock-btn{background:none;border:none;cursor:pointer;font-size:1.2rem;padding:4px 8px;color:white;border-radius:6px;transition:background .15s}
.lock-btn:hover{background:rgba(255,255,255,.15)}
.status-bar{text-align:center;padding:5px 16px;font-size:.78rem;color:#64748b;min-height:26px}
.status-bar.error{color:#DC2626;background:#fef2f2}
.status-bar.success{color:#059669;background:#f0fdf4}
.readonly-notice{background:#fef3c7;border-left:3px solid #f59e0b;padding:8px 16px;font-size:.8rem;color:#92400e;display:none}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px;background:white;border-bottom:1px solid #e2e8f0}
.cal-nav h2{font-size:1.2rem;font-weight:700}
.nav-btn{background:none;border:1px solid #e2e8f0;border-radius:7px;padding:6px 14px;cursor:pointer;font-size:1rem;color:#374151}
.nav-btn:hover{background:#f8fafc}
.cal-wrap{padding:14px}
.cal-header-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.cal-header-row div{text-align:center;font-size:.7rem;font-weight:700;color:#94a3b8;padding:2px}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day{min-height:130px;background:white;border-radius:8px;border:1.5px solid #e2e8f0;padding:6px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.cal-day:hover:not(.other-month){border-color:#93c5fd;box-shadow:0 0 0 2px #dbeafe}
.cal-day.other-month{background:#f8fafc;border-color:transparent;cursor:default;opacity:.5}
.cal-day.today{border-color:#3B82F6;border-width:2px}
.day-num{font-size:.78rem;font-weight:700;margin-bottom:3px;line-height:1}
.today-circle{background:#3B82F6;color:white;width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:.7rem}
.meeting-chip{font-size:.67rem;padding:2px 6px;border-radius:4px;color:white;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;font-weight:500}
.meeting-chip:hover{filter:brightness(1.1)}
.more-badge{font-size:.63rem;color:#94a3b8}
.dots-row{display:none;gap:3px;flex-wrap:wrap;margin-top:2px}
.m-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:white;border-radius:14px;width:100%;max-width:460px;max-height:92vh;overflow-y:auto;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h3{font-size:1.05rem;font-weight:700;margin-bottom:18px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.75rem;font-weight:700;color:#475569;margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.88rem;outline:none;font-family:inherit;background:#f8fafc;transition:border-color .15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#3B82F6;background:white;box-shadow:0 0 0 3px #dbeafe}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid #f1f5f9}
.color-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.color-swatch{width:26px;height:26px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:transform .1s,border-color .1s;flex-shrink:0}
.color-swatch:hover{transform:scale(1.15)}
.color-swatch.selected{border-color:#1e293b;transform:scale(1.1)}
.color-custom{width:32px;height:32px;border-radius:6px;border:1.5px solid #e2e8f0;cursor:pointer;padding:1px;background:#f8fafc}
.repeat-section{background:#f8fafc;border-radius:8px;padding:12px;margin-top:6px}
.day-btns{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.day-btn{padding:5px 10px;border-radius:6px;border:1.5px solid #e2e8f0;background:white;font-size:.78rem;cursor:pointer;font-weight:600;transition:all .1s;font-family:inherit}
.day-btn.on{background:#3B82F6;color:white;border-color:#3B82F6}
.detail-color-bar{width:100%;height:5px;border-radius:3px;margin-bottom:14px}
.detail-row{display:flex;gap:10px;margin-bottom:10px;font-size:.87rem}
.detail-icon{width:20px;text-align:center;flex-shrink:0}
.detail-label{color:#64748b;min-width:52px;font-weight:600}
.detail-value{color:#1e293b}
.repeat-badge{display:inline-flex;align-items:center;gap:4px;background:#eff6ff;color:#2563eb;font-size:.75rem;font-weight:600;padding:3px 10px;border-radius:12px;margin-bottom:12px}
.delete-option{display:flex;flex-direction:column;gap:8px;margin:14px 0}
.delete-opt-btn{padding:12px 16px;border-radius:8px;border:1.5px solid #e2e8f0;background:white;text-align:left;cursor:pointer;font-family:inherit;transition:all .1s}
.delete-opt-btn:hover{border-color:#EF4444;background:#fef2f2}
.delete-opt-btn strong{display:block;font-size:.88rem;color:#1e293b;margin-bottom:2px}
.delete-opt-btn span{font-size:.78rem;color:#64748b}
.unlock-box{text-align:center;padding:8px 0 16px}
.unlock-box .lock-icon{font-size:3rem;margin-bottom:12px}
.unlock-box p{font-size:.85rem;color:#64748b;margin-bottom:16px}
.unlock-error{color:#DC2626;font-size:.8rem;margin-top:6px;display:none;text-align:center}
.info-box{background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:12px 14px;font-size:.8rem;color:#0369a1;margin-bottom:16px;line-height:1.7}
.info-box a{color:#0ea5e9;font-weight:600}
.info-box code{background:#e0f2fe;padding:1px 5px;border-radius:3px;font-size:.75rem}
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px}
.spinner{width:34px;height:34px;border:3px solid #e2e8f0;border-top-color:#3B82F6;border-radius:50%;animation:spin .7s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.setup-needed{margin:20px;background:white;border-radius:12px;padding:28px 24px;text-align:center;border:1.5px dashed #cbd5e1}
.setup-needed h3{color:#374151;margin-bottom:8px}
.setup-needed p{color:#64748b;font-size:.85rem;margin-bottom:16px}
/* Day panel (하단 선택 날짜 개요) */
.day-panel{background:white;border-top:2px solid #e2e8f0;padding:16px 20px 24px;animation:slideUp .2s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.day-panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.day-panel-date{font-size:1rem;font-weight:700;color:#1e293b}
.day-panel-add{background:#3B82F6;color:white;border:none;border-radius:7px;padding:6px 14px;font-size:.8rem;font-weight:600;cursor:pointer;font-family:inherit}
.day-panel-add:hover{opacity:.85}
.day-panel-empty{text-align:center;padding:24px;color:#94a3b8;font-size:.85rem}
.day-list-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:8px;cursor:pointer;transition:background .1s;border:none;width:100%;background:#f8fafc;font-family:inherit;text-align:left;margin-bottom:6px}
.day-list-item:hover{background:#eff6ff}
.day-list-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.day-list-info{flex:1;min-width:0}
.day-list-title{font-size:.88rem;font-weight:600;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.day-list-meta{font-size:.75rem;color:#64748b;margin-top:2px;display:block}
.day-list-badge{font-size:.7rem;padding:1px 7px;border-radius:10px;color:white;font-weight:600;flex-shrink:0}
/* 선택된 날짜 강조 */
.cal-day.selected-day{background:#eff6ff;border-color:#3B82F6}
@media(max-width:600px){
  .cal-day{min-height:56px;padding:4px}
  .meeting-chip{display:none}
  .dots-row{display:flex}
  .cal-wrap{padding:8px}
  .form-row{grid-template-columns:1fr;gap:0}
  .cal-day.has-events{border-color:#93c5fd}
}
</style>
</head>
<body>

<div class="header">
  <h1>📅 회의 달력</h1>
  <div class="header-btns">
    <button class="lock-btn" id="lockBtn" onclick="onLockClick()" title="편집 모드 잠금/해제">🔒</button>
    <button class="btn btn-ghost btn-sm" onclick="openSettings()" id="settingsBtn" style="display:none">⚙️ 설정</button>
    <button class="btn btn-primary btn-sm" id="addBtn" onclick="openAddModal(null)" style="display:none">+ 회의 추가</button>
  </div>
</div>

<div id="statusBar" class="status-bar"></div>
<div id="readonlyNotice" class="readonly-notice">👁️ <strong>읽기 전용 모드</strong> — 🔒 버튼을 눌러 비밀번호를 입력하면 편집할 수 있습니다.</div>
<div id="mainContent"><div class="loading-wrap"><div class="spinner"></div><span style="color:#94a3b8;font-size:.85rem">불러오는 중...</span></div></div>

<!-- ── Unlock Modal ─────────────────────────────────────── -->
<div class="modal-overlay" id="unlockModal">
  <div class="modal" style="max-width:360px">
    <div class="unlock-box">
      <div class="lock-icon">🔐</div>
      <p>관리자 비밀번호를 입력하세요.</p>
      <div class="form-group" style="text-align:left">
        <input type="password" id="unlockInput" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')tryUnlock()">
      </div>
      <div id="tokenGroup" class="form-group" style="text-align:left;display:none">
        <label style="font-size:.75rem;font-weight:700;color:#475569;text-transform:uppercase">GitHub 토큰 <span style="font-weight:400;color:#94a3b8">(최초 1회)</span></label>
        <input type="password" id="tokenInput" placeholder="github_pat_ 또는 ghp_ 로 시작하는 토큰">
        <p style="font-size:.72rem;color:#94a3b8;margin-top:4px">입력하면 이 브라우저에 저장됩니다. 다음부터는 비밀번호만으로 로그인됩니다.</p>
      </div>
      <div class="unlock-error" id="unlockError">❌ 비밀번호가 올바르지 않습니다.</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal('unlockModal')">취소</button>
      <button class="btn btn-primary" onclick="tryUnlock()">확인</button>
    </div>
  </div>
</div>

<!-- ── Add / Edit Modal ─────────────────────────────────── -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3 id="addModalTitle">회의 추가</h3>
    <div class="form-group">
      <label>회의 제목 *</label>
      <input type="text" id="mtTitle" placeholder="예: 주간 팀 스탠드업">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>날짜 *</label>
        <input type="date" id="mtDate">
      </div>
      <div class="form-group">
        <label>시간</label>
        <input type="time" id="mtTime">
      </div>
    </div>
    <div class="form-group">
      <label>색상</label>
      <div class="color-row" id="colorRow"></div>
    </div>
    <div class="form-group">
      <label>반복</label>
      <select id="mtRepeat" onchange="onRepeatChange()">
        <option value="none">반복 없음</option>
        <option value="daily">매일</option>
        <option value="weekly">매주 (요일 선택)</option>
        <option value="biweekly">격주</option>
        <option value="monthly">매월 같은 날짜</option>
        <option value="monthly_nth">매월 N번째 요일</option>
      </select>
      <div class="repeat-section" id="repeatSection" style="display:none">
        <div id="weekdayPicker" style="display:none">
          <span style="font-size:.78rem;color:#64748b;font-weight:600">반복 요일 선택</span>
          <div class="day-btns" id="dayBtns"></div>
        </div>
        <div id="nthPicker" style="display:none;margin-bottom:4px">
          <span style="font-size:.78rem;color:#64748b;font-weight:600">매월 몇 번째 무슨 요일?</span>
          <div style="display:flex;gap:8px;margin-top:8px">
            <select id="mtNth" style="flex:1;padding:8px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.85rem;background:#f8fafc">
              <option value="1">첫 번째</option>
              <option value="2">두 번째</option>
              <option value="3">세 번째</option>
              <option value="4">네 번째</option>
            </select>
            <select id="mtNthDay" style="flex:1;padding:8px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.85rem;background:#f8fafc">
              <option value="0">일요일</option>
              <option value="1">월요일</option>
              <option value="2">화요일</option>
              <option value="3">수요일</option>
              <option value="4">목요일</option>
              <option value="5">금요일</option>
              <option value="6">토요일</option>
            </select>
          </div>
        </div>
        <div class="form-group" style="margin-top:10px;margin-bottom:0">
          <label>종료 날짜 <span style="font-weight:400;color:#94a3b8">(미입력 시 1년)</span></label>
          <input type="date" id="mtRepeatEnd">
        </div>
      </div>
    </div>
    <div class="form-group">
      <label>참석자</label>
      <input type="text" id="mtMembers" placeholder="홍길동, 김철수, ...">
    </div>
    <div class="form-group">
      <label>메모 / 안건</label>
      <textarea id="mtDesc" rows="3" placeholder="회의 목적, 장소, 안건 등"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal('addModal')">취소</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveMeeting()">저장</button>
    </div>
  </div>
</div>

<!-- ── Detail Modal ─────────────────────────────────────── -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="detail-color-bar" id="detailColorBar"></div>
    <h3 id="detailTitle"></h3>
    <div id="detailRepeatBadge" style="display:none" class="repeat-badge">🔁 <span id="detailRepeatText"></span></div>
    <div class="detail-row"><span class="detail-icon">📅</span><span class="detail-label">날짜</span><span class="detail-value" id="detailDate"></span></div>
    <div class="detail-row"><span class="detail-icon">⏰</span><span class="detail-label">시간</span><span class="detail-value" id="detailTime"></span></div>
    <div class="detail-row"><span class="detail-icon">👥</span><span class="detail-label">참석자</span><span class="detail-value" id="detailMembers"></span></div>
    <div class="detail-row"><span class="detail-icon">📝</span><span class="detail-label">메모</span><span class="detail-value" id="detailDesc" style="white-space:pre-wrap"></span></div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal('detailModal')">닫기</button>
      <button class="btn btn-danger" id="deleteBtn" onclick="onDeleteClick()" style="display:none">삭제</button>
      <button class="btn btn-primary" id="editBtn" onclick="startEdit()" style="display:none">수정</button>
    </div>
  </div>
</div>

<!-- ── Day List Modal (모바일용) ───────────────────────── -->
<div class="modal-overlay" id="dayListModal">
  <div class="modal" style="max-width:380px">
    <h3 id="dayListTitle"></h3>
    <div id="dayListItems" style="margin-top:4px"></div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal('dayListModal')">닫기</button>
    </div>
  </div>
</div>

<!-- ── Delete Options Modal ─────────────────────────────── -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <h3>🗑️ 삭제 옵션</h3>
    <p style="font-size:.85rem;color:#64748b;margin-bottom:4px" id="deleteModalDesc"></p>
    <div class="delete-option" id="deleteOptions"></div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal('deleteModal')">취소</button>
    </div>
  </div>
</div>

<!-- ── Settings Modal (관리자 전용) ─────────────────────── -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h3>⚙️ GitHub 연결 설정</h3>
    <div class="info-box">
      회의 데이터를 GitHub 저장소의 <code>meetings.json</code>에 저장합니다.<br>
      토큰은 HTML 파일에 내장되어 있습니다.
    </div>
    <div class="form-group">
      <label>GitHub 사용자명 (owner) *</label>
      <input type="text" id="cfgOwner" placeholder="예: my-username">
    </div>
    <div class="form-group">
      <label>저장소 이름 (repository) *</label>
      <input type="text" id="cfgRepo" placeholder="예: meeting-calendar">
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal('settingsModal')">취소</button>
      <button class="btn btn-primary" id="saveSettingsBtn" onclick="saveSettings()">저장 및 연결</button>
    </div>
  </div>
</div>

<script>
// ╔══════════════════════════════════════════════════════╗
// ║  ★ 관리자 전용 설정 — 이 부분만 수정하세요          ║
// ╠══════════════════════════════════════════════════════╣

const DEFAULT_OWNER = 'bluebird1131-spec';
const DEFAULT_REPO  = 'meeting-calendar';

// 토큰은 HTML에 저장하지 않습니다 — 🔒 버튼으로 로그인 시 입력
const _T = '';

// ╚══════════════════════════════════════════════════════╝

// 비밀번호 SHA-256 해시 (변경 금지 — '마스터윤동현'의 해시값)
const _PH = 'e00c1bce5e219f8957f3886f242d0caa69348fcf2fc58678bca9c9f530396aaa';

// ── Constants ────────────────────────────────────────────
const PRESET_COLORS = [
  '#EF4444','#F97316','#F59E0B','#84CC16',
  '#22C55E','#14B8A6','#3B82F6','#6366F1',
  '#8B5CF6','#EC4899','#64748B','#1e293b'
];
const DAY_NAMES = ['일','월','화','수','목','금','토'];
const REPEAT_LABELS = { none:'', daily:'매일', weekly:'매주', biweekly:'격주', monthly:'매월', monthly_nth:'매월N번째' };
const NTH_LABELS = ['','첫번째','두번째','세번째','네번째'];

// ── State ────────────────────────────────────────────────
let config = {};
let meetings = [];
let fileSha = null;
let currentYear, currentMonth;
let selectedColor = PRESET_COLORS[6];
let selectedDays = [];
let editingId = null;
let selectedDetailId = null;
let selectedDate = null;  // 하단 패널에 표시 중인 날짜
let isUnlocked = false;  // 편집 모드 여부 (세션 동안만 유지)

const today = new Date();
currentYear = today.getFullYear();
currentMonth = today.getMonth();

// ── Token / Config ───────────────────────────────────────
function getToken() {
  return localStorage.getItem('mtcal_tok') || config.token || '';
}

function loadConfig() {
  try { config = JSON.parse(localStorage.getItem('mtcal_v2') || '{}'); }
  catch { config = {}; }
  if (DEFAULT_OWNER) config.owner = DEFAULT_OWNER;
  if (DEFAULT_REPO)  config.repo  = DEFAULT_REPO;
}
function persistConfig() { localStorage.setItem('mtcal_v2', JSON.stringify(config)); }

// ── Password ──────────────────────────────────────────────
async function sha256hex(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function tryUnlock() {
  const pw = document.getElementById('unlockInput').value;
  const hash = await sha256hex(pw);
  if (hash !== _PH) {
    document.getElementById('unlockError').style.display = 'block';
    document.getElementById('unlockInput').value = '';
    document.getElementById('unlockInput').focus();
    return;
  }
  // 비밀번호 맞음 — 토큰 확인
  const tokenGroup = document.getElementById('tokenGroup');
  const storedToken = localStorage.getItem('mtcal_tok');
  if (!storedToken) {
    // 토큰 미저장 — 입력 요청
    tokenGroup.style.display = 'block';
    document.getElementById('tokenInput').focus();
    const btn = document.querySelector('#unlockModal .btn-primary');
    btn.textContent = '저장 및 활성화';
    btn.onclick = async () => {
      const tok = document.getElementById('tokenInput').value.trim();
      if (!tok) { alert('토큰을 입력해주세요.'); return; }
      localStorage.setItem('mtcal_tok', tok);
      config.token = tok;
      completeUnlock();
    };
    return;
  }
  config.token = storedToken;
  completeUnlock();
}

function completeUnlock() {
  isUnlocked = true;
  document.getElementById('lockBtn').textContent = '🔓';
  document.getElementById('lockBtn').title = '편집 모드 활성 (클릭하여 잠금)';

// ── GitHub API ────────────────────────────────────────────
const DATA_FILE = 'meetings.json';
function apiUrl() { return `https://api.github.com/repos/${config.owner}/${config.repo}/contents/${DATA_FILE}`; }
function apiHeaders(auth) {
  const h = { 'Accept':'application/vnd.github+json', 'X-GitHub-Api-Version':'2022-11-28' };
  const tok = getToken();
  if (auth && tok) h['Authorization'] = `Bearer ${tok}`;
  return h;
}

async function fetchMeetings() {
  const res = await fetch(apiUrl(), { headers: apiHeaders(true) });
  if (res.status === 404) return null;
  if (res.status === 401 || res.status === 403) throw new Error('토큰이 유효하지 않거나 권한이 없습니다.');
  if (!res.ok) throw new Error(`GitHub API 오류 (${res.status})`);
  const data = await res.json();
  fileSha = data.sha;
  return JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\s/g,'')))));
}

async function pushMeetings(msg) {
  const tok = getToken();
  if (!tok) throw new Error('토큰이 설정되지 않았습니다.');
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(meetings, null, 2))));
  const body = { message: msg || 'Update meetings', content };
  if (fileSha) body.sha = fileSha;
  const res = await fetch(apiUrl(), {
    method: 'PUT',
    headers: { ...apiHeaders(true), 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (res.status === 409) {
    showStatus('⚠️ 충돌 발생 — 새로 불러옵니다.', 'error');
    await loadMeetings(); throw new Error('충돌 — 다시 시도해주세요');
  }
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.message||`저장 실패(${res.status})`); }
  fileSha = (await res.json()).content.sha;
}

async function loadMeetings() {
  if (!config.owner || !config.repo) { renderSetupNeeded(); return; }
  showStatus('불러오는 중...');
  try {
    const data = await fetchMeetings();
    if (data === null) {
      meetings = [];
      await pushMeetings('Initialize meetings.json');
      showStatus('✅ 새 달력이 생성되었습니다!', 'success');
    } else {
      meetings = Array.isArray(data) ? data : [];
      showStatus('');
    }
    renderAll();
  } catch(e) {
    showStatus('❌ ' + e.message, 'error');
    meetings = [];
    renderAll();
  }
}

// ── Date Utils ────────────────────────────────────────────
function parseDate(s) { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function toDateStr(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function fmtDate(s) {
  const [y,m,d]=s.split('-');
  return `${y}년 ${+m}월 ${+d}일 (${DAY_NAMES[new Date(+y,+m-1,+d).getDay()]})`;
}

function getNthWeekday(year, month, nth, weekday) {
  // 해당 월의 nth번째 weekday 날짜 반환 (없으면 null)
  const first = new Date(year, month, 1);
  const offset = ((weekday - first.getDay()) + 7) % 7;
  const day = 1 + offset + (nth - 1) * 7;
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  return day <= daysInMonth ? new Date(year, month, day) : null;
}

function generateSeriesDates(startDate, repeatType, repeatDays, endDate, repeatNth, repeatNthDay) {
  if (repeatType === 'none') return [startDate];
  const start = parseDate(startDate);
  const limit = endDate ? parseDate(endDate) : new Date(start.getFullYear()+1, start.getMonth(), start.getDate());
  const dates = [];
  if (repeatType === 'daily') {
    let d=new Date(start);
    while(d<=limit&&dates.length<500){dates.push(toDateStr(d));d.setDate(d.getDate()+1);}
  } else if (repeatType === 'weekly') {
    const days = repeatDays.length ? repeatDays : [start.getDay()];
    let d=new Date(start);
    while(d<=limit&&dates.length<500){if(days.includes(d.getDay()))dates.push(toDateStr(d));d.setDate(d.getDate()+1);}
  } else if (repeatType === 'biweekly') {
    let d=new Date(start);
    while(d<=limit&&dates.length<200){dates.push(toDateStr(d));d.setDate(d.getDate()+14);}
  } else if (repeatType === 'monthly') {
    let d=new Date(start);
    while(d<=limit&&dates.length<60){dates.push(toDateStr(d));d.setMonth(d.getMonth()+1);}
  } else if (repeatType === 'monthly_nth') {
    const nth = parseInt(repeatNth)||1;
    const wd  = parseInt(repeatNthDay);
    let y=start.getFullYear(), m=start.getMonth();
    while(dates.length<60) {
      const d = getNthWeekday(y, m, nth, wd);
      if(d && d>=start && d<=limit) dates.push(toDateStr(d));
      if(d && d>limit) break;
      m++; if(m>11){m=0;y++;}
      if(new Date(y,m,1)>limit) break;
    }
  }
  return dates;
}

function renderCalendar() {
  const title=document.getElementById('calTitle');
  const daysEl=document.getElementById('calDays');
  if(!title||!daysEl) return;
  title.textContent=`${currentYear}년 ${currentMonth+1}월`;
  const firstDow=new Date(currentYear,currentMonth,1).getDay();
  const daysInMonth=new Date(currentYear,currentMonth+1,0).getDate();
  const daysInPrev=new Date(currentYear,currentMonth,0).getDate();
  const map={};
  meetings.forEach(m=>{(map[m.date]=map[m.date]||[]).push(m);});
  Object.values(map).forEach(arr=>arr.sort((a,b)=>(a.time||'').localeCompare(b.time||'')));
  let html='';
  for(let i=firstDow-1;i>=0;i--) html+=buildCell(currentYear,currentMonth-1,daysInPrev-i,true,map);
  for(let d=1;d<=daysInMonth;d++) html+=buildCell(currentYear,currentMonth,d,false,map);
  const total=firstDow+daysInMonth;
  const rem=total%7===0?0:7-total%7;
  for(let d=1;d<=rem;d++) html+=buildCell(currentYear,currentMonth+1,d,true,map);
  daysEl.innerHTML=html;
}

function buildCell(year,month,day,other,map) {
  const am=((month%12)+12)%12, ay=year+Math.floor(month/12);
  const ds=`${ay}-${String(am+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  const dow=new Date(ay,am,day).getDay();
  const isToday=!other&&day===today.getDate()&&am===today.getMonth()&&ay===today.getFullYear();
  const ms=map[ds]||[];
  const canEdit=isUnlocked&&!!getToken();
  let cls='cal-day'+(other?' other-month':'')+(isToday?' today':'')+(ms.length?' has-events':'')+(ds===selectedDate?' selected-day':'');
  // 날짜 클릭 → 항상 해당 날 목록/추가 팝업 (데스크탑·모바일 동일)
  const clickAttr=other?' ':`onclick="openDayList('${ds}')"`;
  const numColor=other?'#cbd5e1':dow===0?'#EF4444':dow===6?'#3B82F6':'#374151';
  const dayNumHtml=isToday
    ?`<div class="day-num"><span class="today-circle">${day}</span></div>`
    :`<div class="day-num" style="color:${numColor}">${day}</div>`;
  const MAX=6;
  const chips=ms.slice(0,MAX).map(m=>{
    const rIcon=m.seriesId?'🔁 ':'';
    const timeStr=m.time?m.time.slice(0,5)+' ':'';
    return `<div class="meeting-chip" style="background:${m.color||'#3B82F6'}" onclick="event.stopPropagation();openDetail('${m.id}')">${rIcon}${timeStr}${escH(m.title)}</div>`;
  }).join('');
  const more=ms.length>MAX?`<div class="more-badge">+${ms.length-MAX}개</div>`:'';
  const dots=ms.slice(0,6).map(m=>`<span class="m-dot" style="background:${m.color||'#3B82F6'}"></span>`).join('');
  const dotsHtml=ms.length?`<div class="dots-row">${dots}</div>`:'';
  return `<div class="${cls}" ${clickAttr}>${dayNumHtml}${chips}${more}${dotsHtml}</div>`;
}

function prevMonth(){if(--currentMonth<0){currentMonth=11;currentYear--;}renderCalendar();}

    ? dayMeetings.map(m=>{

          ? `<span class="day-list-badge" style="background:#6366F1">🔁 ${rLabel}</span>` : '';

          </span>
          ${repeatBadge}
          <span style="color:#cbd5e1;font-size:.9rem">›</span>
        </button>`;
      }).join('')
    : `<div class="day-panel-empty">📭 등록된 회의가 없습니다.</div>`;

  const addBtn = canEdit
    ? `<button class="day-panel-add" onclick="openAddModal('${ds}')">+ 회의 추가</button>` : '';

  document.getElementById('dayPanel').innerHTML = `

        <span class="day-panel-date">📅 ${+mo}월 ${+d}일 (${dow})</span>

}

async function saveMeeting() {
  const title=document.getElementById('mtTitle').value.trim();
  const date=document.getElementById('mtDate').value;
  if(!title||!date){alert('제목과 날짜는 필수입니다.');return;}
  const btn=document.getElementById('saveBtn');
  btn.disabled=true; btn.textContent='저장 중...';
  const repeatType=document.getElementById('mtRepeat').value;
  const repeatEnd=document.getElementById('mtRepeatEnd').value||'';
  const repeatNth=document.getElementById('mtNth').value;
  const repeatNthDay=document.getElementById('mtNthDay').value;
  const base={title,date,time:document.getElementById('mtTime').value,color:selectedColor,
    members:document.getElementById('mtMembers').value.trim(),
    description:document.getElementById('mtDesc').value.trim(),
    repeatType,repeatDays:repeatType==='weekly'?[...selectedDays]:[],
    repeatEnd,repeatNth:parseInt(repeatNth),repeatNthDay:parseInt(repeatNthDay)};
  const backup=[...meetings];
  try {
    if(editingId){
      const idx=meetings.findIndex(x=>x.id===editingId);
      if(idx!==-1)meetings[idx]={...meetings[idx],...base};
      await pushMeetings(`수정: ${title}`);
    } else if(repeatType==='none'){
      meetings.push({...base,id:genId(),seriesId:null});
      await pushMeetings(`추가: ${title}`);
    } else {
      const dates=generateSeriesDates(date,repeatType,base.repeatDays,repeatEnd,repeatNth,repeatNthDay);
      const seriesId=genId();
      dates.forEach(d=>meetings.push({...base,id:genId(),date:d,seriesId}));
      await pushMeetings(`반복 추가: ${title} (${dates.length}건)`);
    }
    document.getElementById('mtRepeat').disabled=false;
    closeModal('addModal');
    showStatus('✅ 저장되었습니다.','success');
    renderCalendar();
    if(selectedDate) openDayList(selectedDate);
  } catch(e){
    meetings=backup;
    showStatus('❌ '+e.message,'error');
  } finally {
    btn.disabled=false; btn.textContent='저장';
    document.getElementById('mtRepeat').disabled=false;
  }
}

  closeModal('detailModal');
  if(!m.seriesId){if(confirm(`"${m.title}" 회의를 삭제할까요?`))doDelete('single');return;}
  document.getElementById('deleteModalDesc').textContent=`"${m.title}" — 반복 일정입니다.`;
  document.getElementById('deleteOptions').innerHTML=[
    {label:'이 일정만 삭제', desc:'선택한 날짜의 일정만 삭제합니다.', fn:'single'},
    {label:'이 날짜 이후 전체 삭제', desc:'이 일정과 이후 모든 반복 일정을 삭제합니다.', fn:'future'},
    {label:'시리즈 전체 삭제', desc:'과거·미래 포함 이 반복 시리즈 전체를 삭제합니다.', fn:'all'},
  ].map(o=>`<button class="delete-opt-btn" onclick="doDelete('${o.fn}')">
    <strong>${o.label}</strong><span>${o.desc}</span></button>`).join('');
  document.getElementById('deleteModal').classList.add('show');
}

async function doDelete(mode) {
  closeModal('deleteModal');
  const m=meetings.find(x=>x.id===selectedDetailId); if(!m) return;
  const backup=[...meetings];
  try {
    if(mode==='single') meetings=meetings.filter(x=>x.id!==selectedDetailId);
    else if(mode==='future') meetings=meetings.filter(x=>!(x.seriesId===m.seriesId&&x.date>=m.date));
    else meetings=meetings.filter(x=>x.seriesId!==m.seriesId);
    await pushMeetings(`삭제(${mode}): ${m.title}`);
    showStatus('✅ 삭제되었습니다.','success');
    renderCalendar();
    if(selectedDate) openDayList(selectedDate);
  } catch(e){ meetings=backup; showStatus('❌ '+e.message,'error'); }
}

// ── Settings (관리자 전용) ─────────────────────────────────
function openSettings() {
  if(!isUnlocked){showStatus('🔒 설정은 편집 모드에서만 접근 가능합니다.','error');return;}
  loadConfig();
  document.getElementById('cfgOwner').value=config.owner||'';
  document.getElementById('cfgRepo').value=config.repo||'';
  document.getElementById('settingsModal').classList.add('show');
}

async function saveSettings() {
  const owner=document.getElementById('cfgOwner').value.trim();
  const repo=document.getElementById('cfgRepo').value.trim();
  if(!owner||!repo){alert('사용자명과 저장소 이름은 필수입니다.');return;}
  const btn=document.getElementById('saveSettingsBtn');
  btn.disabled=true; btn.textContent='연결 중...';
  config={...config,owner,repo}; persistConfig();
  closeModal('settingsModal');
  await loadMeetings();
  btn.disabled=false; btn.textContent='저장 및 연결';
}

// ── Events ────────────────────────────────────────────────
document.querySelectorAll('.modal-overlay').forEach(el=>
  el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('show');}));
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')document.querySelectorAll('.modal-overlay.show').forEach(m=>m.classList.remove('show'));
  if(e.key==='Enter'&&document.getElementById('unlockModal').classList.contains('show'))tryUnlock();
  if(e.key==='Enter'&&document.getElementById('addModal').classList.contains('show'))
    if(document.activeElement.tagName!=='TEXTAREA')saveMeeting();
});

// ── Init ──────────────────────────────────────────────────
loadConfig();
if(!config.owner||!config.repo){setTimeout(()=>{},100);renderSetupNeeded();}
else loadMeetings();
</script>
