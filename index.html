<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회의 달력</title>
<style>
:root{
  --bg:#F1F5FF;--card:#fff;--border:#E4E9F5;
  --text:#0F172A;--text2:#64748B;--text3:#94A3B8;
  --primary:#6366F1;--primary-l:#EEF2FF;
  --red:#EF4444;--green:#10B981;
  --shadow:0 1px 3px rgba(15,23,42,.06),0 4px 14px rgba(15,23,42,.06);
  --shadow-lg:0 8px 30px rgba(15,23,42,.12);
  --r:10px;--r-sm:7px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── Header ── */
.header{background:linear-gradient(135deg,#0F172A 0%,#1E293B 100%);color:white;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.header-left{display:flex;align-items:center;gap:10px}
.header h1{font-size:1.1rem;font-weight:700;letter-spacing:-.3px}
.header-sub{font-size:.72rem;color:rgba(255,255,255,.45);margin-top:1px}
.header-btns{display:flex;gap:8px;align-items:center}

/* ── Buttons ── */
.btn{padding:7px 16px;border:none;border-radius:var(--r-sm);cursor:pointer;font-size:.82rem;font-weight:600;transition:all .15s;letter-spacing:-.1px}
.btn:hover{filter:brightness(1.08)}
.btn:disabled{opacity:.5;cursor:default}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:white;box-shadow:0 2px 8px rgba(99,102,241,.35)}
.btn-ghost{background:rgba(255,255,255,.1);color:white;border:1px solid rgba(255,255,255,.2);backdrop-filter:blur(4px)}
.btn-ghost:hover{background:rgba(255,255,255,.18)}
.btn-danger{background:var(--red);color:white;box-shadow:0 2px 8px rgba(239,68,68,.3)}
.btn-cancel{background:#F1F5F9;color:#374151}
.btn-sm{padding:5px 13px;font-size:.78rem}
.lock-btn{background:none;border:none;cursor:pointer;font-size:1.25rem;padding:5px 8px;color:white;border-radius:var(--r-sm);transition:background .15s;line-height:1}
.lock-btn:hover{background:rgba(255,255,255,.15)}

/* ── Status / Notice ── */
.status-bar{text-align:center;padding:5px 16px;font-size:.76rem;color:var(--text2);min-height:26px;transition:all .2s}
.status-bar.error{color:#DC2626;background:#FEF2F2;border-bottom:1px solid #FECACA}
.status-bar.success{color:#059669;background:#F0FDF4;border-bottom:1px solid #A7F3D0}
.readonly-notice{background:linear-gradient(90deg,#FFFBEB,#FEF3C7);border-left:3px solid #F59E0B;padding:9px 18px;font-size:.79rem;color:#92400E;display:none}

/* ── Navigation ── */
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:16px 24px 12px;background:var(--card);border-bottom:1px solid var(--border)}
.cal-nav h2{font-size:1.25rem;font-weight:800;background:linear-gradient(135deg,var(--primary),#8B5CF6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-btn{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:7px 16px;cursor:pointer;font-size:1rem;color:var(--text2);transition:all .15s;box-shadow:var(--shadow)}
.nav-btn:hover{border-color:var(--primary);color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.1)}

/* ── Calendar ── */
.cal-wrap{padding:16px}
.cal-header-row{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:5px}
.cal-header-row div{text-align:center;font-size:.7rem;font-weight:700;color:var(--text3);padding:3px;letter-spacing:.5px;text-transform:uppercase}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal-day{min-height:130px;background:var(--card);border-radius:var(--r);border:1.5px solid var(--border);padding:7px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.cal-day:hover:not(.other-month){border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.12),var(--shadow)}
.cal-day.other-month{background:#F8FAFC;border-color:transparent;cursor:default;opacity:.45;box-shadow:none}
.cal-day.today{border-color:var(--primary);border-width:2px;background:linear-gradient(145deg,#FAFBFF,#EEF2FF)}
.cal-day.selected-day{background:linear-gradient(145deg,#EEF2FF,#E0E7FF);border-color:var(--primary)}
.cal-day.has-events{border-color:#C7D2FE}
.day-num{font-size:.78rem;font-weight:700;margin-bottom:4px;line-height:1}
.today-circle{background:linear-gradient(135deg,var(--primary),#8B5CF6);color:white;width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:.7rem;box-shadow:0 2px 6px rgba(99,102,241,.4)}
.meeting-chip{font-size:.66rem;padding:2px 7px;border-radius:20px;color:white;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;font-weight:600;letter-spacing:-.1px;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.meeting-chip:hover{filter:brightness(1.12);transform:translateY(-1px)}
.more-badge{font-size:.62rem;color:var(--text3);padding-left:2px;font-weight:600}
.dots-row{display:none;gap:3px;flex-wrap:wrap;margin-top:3px}
.m-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;box-shadow:0 1px 2px rgba(0,0,0,.15)}

/* ── Modals ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}
.modal-overlay.show{display:flex;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--card);border-radius:16px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;padding:26px;box-shadow:var(--shadow-lg);animation:slideUp .2s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.modal h3{font-size:1.05rem;font-weight:800;margin-bottom:18px;color:var(--text)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* ── Form ── */
.form-group{margin-bottom:15px}
.form-group label{display:block;font-size:.72rem;font-weight:800;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 13px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:.88rem;outline:none;font-family:inherit;background:#FAFBFF;color:var(--text);transition:all .15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary);background:white;box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ── Emoji Picker ── */
.emoji-grid{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.emoji-btn{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--border);background:#FAFBFF;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
.emoji-btn:hover{border-color:var(--primary);background:var(--primary-l);transform:scale(1.1)}
.emoji-btn.selected{border-color:var(--primary);background:var(--primary-l);box-shadow:0 0 0 2px rgba(99,102,241,.25)}
.emoji-none{font-size:.72rem;color:var(--text3);font-weight:600}

/* ── Color Picker ── */
.color-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.color-swatch{width:26px;height:26px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:transform .12s,border-color .12s;flex-shrink:0}
.color-swatch:hover{transform:scale(1.18)}
.color-swatch.selected{border-color:var(--text);transform:scale(1.12);box-shadow:0 2px 6px rgba(0,0,0,.2)}
.color-custom{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);cursor:pointer;padding:1px;background:#FAFBFF}

/* ── Repeat ── */
.repeat-section{background:#F8FAFF;border:1.5px solid var(--border);border-radius:var(--r-sm);padding:12px;margin-top:6px}
.day-btns{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.day-btn{padding:5px 11px;border-radius:20px;border:1.5px solid var(--border);background:white;font-size:.78rem;cursor:pointer;font-weight:700;transition:all .12s;font-family:inherit;color:var(--text2)}
.day-btn:hover{border-color:var(--primary);color:var(--primary)}
.day-btn.on{background:var(--primary);color:white;border-color:var(--primary);box-shadow:0 2px 6px rgba(99,102,241,.3)}

/* ── Detail Modal ── */
.detail-color-bar{width:100%;height:5px;border-radius:3px;margin-bottom:16px}
.detail-emoji{font-size:2rem;margin-bottom:8px;display:block}
.detail-row{display:flex;gap:10px;margin-bottom:10px;font-size:.87rem;align-items:flex-start}
.detail-icon{width:22px;text-align:center;flex-shrink:0;font-size:.9rem}
.detail-label{color:var(--text2);min-width:52px;font-weight:700;font-size:.78rem;padding-top:1px}
.detail-value{color:var(--text)}
.repeat-badge{display:inline-flex;align-items:center;gap:4px;background:var(--primary-l);color:var(--primary);font-size:.73rem;font-weight:700;padding:3px 10px;border-radius:12px;margin-bottom:12px;border:1px solid #C7D2FE}

/* ── Delete Options ── */
.delete-option{display:flex;flex-direction:column;gap:8px;margin:14px 0}
.delete-opt-btn{padding:13px 16px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);text-align:left;cursor:pointer;font-family:inherit;transition:all .12s}
.delete-opt-btn:hover{border-color:var(--red);background:#FFF5F5;box-shadow:0 0 0 3px rgba(239,68,68,.08)}
.delete-opt-btn strong{display:block;font-size:.87rem;color:var(--text);margin-bottom:2px}
.delete-opt-btn span{font-size:.76rem;color:var(--text2)}

/* ── Day Panel ── */
.day-panel{background:var(--card);border-top:2px solid var(--primary-l);padding:18px 24px 28px;animation:slideUp .2s ease}
.day-panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.day-panel-date{font-size:1rem;font-weight:800;color:var(--text)}
.day-panel-add{background:var(--primary);color:white;border:none;border-radius:var(--r-sm);padding:6px 14px;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 2px 8px rgba(99,102,241,.3);transition:all .15s}
.day-panel-add:hover{filter:brightness(1.08);transform:translateY(-1px)}
.day-panel-empty{text-align:center;padding:28px;color:var(--text3);font-size:.85rem}
.day-list-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;cursor:pointer;transition:all .12s;border:1.5px solid var(--border);width:100%;background:var(--card);font-family:inherit;text-align:left;margin-bottom:6px;box-shadow:var(--shadow)}
.day-list-item:hover{border-color:var(--primary);background:var(--primary-l);box-shadow:0 0 0 3px rgba(99,102,241,.08)}
.day-list-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.day-list-emoji{font-size:1.3rem;flex-shrink:0;line-height:1}
.day-list-info{flex:1;min-width:0}
.day-list-title{font-size:.88rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.day-list-meta{font-size:.74rem;color:var(--text2);margin-top:2px;display:block}
.day-list-badge{font-size:.68rem;padding:2px 8px;border-radius:12px;color:white;font-weight:700;flex-shrink:0}

/* ── Unlock Modal ── */
.unlock-box{text-align:center;padding:8px 0 14px}
.lock-icon{font-size:3.2rem;margin-bottom:14px}
.unlock-box p{font-size:.85rem;color:var(--text2);margin-bottom:16px;line-height:1.6}
.unlock-error{color:#DC2626;font-size:.79rem;margin-top:7px;display:none;text-align:center;background:#FEF2F2;border-radius:6px;padding:6px}

/* ── Info Box ── */
.info-box{background:#F0F9FF;border:1px solid #BAE6FD;border-radius:10px;padding:13px 15px;font-size:.79rem;color:#0369A1;margin-bottom:16px;line-height:1.75}
.info-box a{color:#0EA5E9;font-weight:700}
.info-box code{background:#E0F2FE;padding:1px 6px;border-radius:4px;font-size:.74rem}

/* ── Loading ── */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 20px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.setup-needed{margin:20px;background:var(--card);border-radius:16px;padding:32px 28px;text-align:center;border:2px dashed var(--border);box-shadow:var(--shadow)}
.setup-needed h3{color:var(--text);margin-bottom:8px;font-size:1.1rem;font-weight:800}
.setup-needed p{color:var(--text2);font-size:.85rem;margin-bottom:18px;line-height:1.6}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}

@media(max-width:600px){
  .cal-day{min-height:56px;padding:4px}
  .meeting-chip{display:none}
  .dots-row{display:flex}
  .cal-wrap{padding:10px}
  .form-row{grid-template-columns:1fr;gap:0}
  .day-panel{padding:14px 16px 20px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div>
      <h1>📅 회의 달력</h1>
    </div>
  </div>
  <div class="header-btns">
    <button class="lock-btn" id="lockBtn" onclick="onLockClick()" title="편집 모드 잠금/해제">🔒</button>
    <button class="btn btn-ghost btn-sm" onclick="openSettings()" id="settingsBtn" style="display:none">⚙️ 설정</button>
    <button class="btn btn-primary btn-sm" id="addBtn" onclick="openAddModal(null)" style="display:none">＋ 회의 추가</button>
  </div>
</div>

<div id="statusBar" class="status-bar"></div>
<div id="readonlyNotice" class="readonly-notice">👁️ <strong>읽기 전용 모드</strong> — 🔒 버튼을 눌러 비밀번호를 입력하면 편집할 수 있습니다.</div>
<div id="mainContent"><div class="loading-wrap"><div class="spinner"></div><span style="color:var(--text3);font-size:.85rem">불러오는 중...</span></div></div>

<!-- ── Unlock Modal ──────────────────────────────────── -->
<div class="modal-overlay" id="unlockModal">
  <div class="modal" style="max-width:360px">
    <div class="unlock-box">
      <div class="lock-icon">🔐</div>
      <p>편집 모드를 활성화하려면<br>관리자 비밀번호를 입력하세요.</p>
      <div class="form-group" style="text-align:left">
        <input type="password" id="unlockInput" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')tryUnlock()">
      </div>
      <div id="tokenGroup" class="form-group" style="text-align:left;display:none">
        <label>GitHub 토큰 <span style="font-weight:400;color:var(--text3)">(최초 1회)</span></label>
        <input type="password" id="tokenInput" placeholder="github_pat_ 또는 ghp_ 로 시작하는 토큰">
        <p style="font-size:.72rem;color:var(--text3);margin-top:5px">입력하면 이 브라우저에 저장됩니다.</p>
      </div>
      <div class="unlock-error" id="unlockError">❌ 비밀번호가 올바르지 않습니다.</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal('unlockModal')">취소</button>
      <button class="btn btn-primary" onclick="tryUnlock()">확인</button>
    </div>
  </div>
</div>

<!-- ── Add / Edit Modal ──────────────────────────────── -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3 id="addModalTitle">회의 추가</h3>
    <div class="form-group">
      <label>이모티콘</label>
      <div class="emoji-grid" id="emojiGrid"></div>
    </div>
    <div class="form-group">
      <label>회의 제목 *</label>
      <input type="text" id="mtTitle" placeholder="예: 주간 팀 스탠드업">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>날짜 *</label>
        <input type="date" id="mtDate">
      </div>
      <div class="form-group">
        <label>시간</label>
        <input type="time" id="mtTime">
      </div>
    </div>
    <div class="form-group">
      <label>색상</label>
      <div class="color-row" id="colorRow"></div>
    </div>
    <div class="form-group">
      <label>반복</label>
      <select id="mtRepeat" onchange="onRepeatChange()">
        <option value="none">반복 없음</option>
        <option value="daily">매일</option>
        <option value="weekly">매주 (요일 선택)</option>
        <option value="biweekly">격주</option>
        <option value="monthly">매월 같은 날짜</option>
        <option value="monthly_nth">매월 N번째 요일</option>
      </select>
      <div class="repeat-section" id="repeatSection" style="display:none">
        <div id="weekdayPicker" style="display:none">
          <span style="font-size:.75rem;color:var(--text2);font-weight:700">반복 요일 선택</span>
          <div class="day-btns" id="dayBtns"></div>
        </div>
        <div id="nthPicker" style="display:none;margin-bottom:4px">
          <span style="font-size:.75rem;color:var(--text2);font-weight:700">매월 몇 번째 무슨 요일?</span>
          <div style="display:flex;gap:8px;margin-top:8px">
            <select id="mtNth" style="flex:1;padding:8px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:.85rem;background:#FAFBFF">
              <option value="1">첫 번째</option>
              <option value="2">두 번째</option>
              <option value="3">세 번째</option>
              <option value="4">네 번째</option>
            </select>
            <select id="mtNthDay" style="flex:1;padding:8px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:.85rem;background:#FAFBFF">
              <option value="0">일요일</option><option value="1">월요일</option>
              <option value="2">화요일</option><option value="3">수요일</option>
              <option value="4">목요일</option><option value="5">금요일</option>
              <option value="6">토요일</option>
            </select>
          </div>
        </div>
        <div class="form-group" style="margin-top:10px;margin-bottom:0">
          <label>종료 날짜 <span style="font-weight:400;color:var(--text3)">(미입력 시 1년)</span></label>
          <input type="date" id="mtRepeatEnd">
        </div>
      </div>
    </div>
    <div class="form-group">
      <label>참석자</label>
      <input type="text" id="mtMembers" placeholder="홍길동, 김철수, ...">
    </div>
    <div class="form-group">
      <label>메모 / 안건</label>
      <textarea id="mtDesc" rows="3" placeholder="회의 목적, 장소, 안건 등"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal('addModal')">취소</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveMeeting()">저장</button>
    </div>
  </div>
</div>

<!-- ── Detail Modal ──────────────────────────────────── -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="detail-color-bar" id="detailColorBar"></div>
    <span class="detail-emoji" id="detailEmoji" style="display:none"></span>
    <h3 id="detailTitle"></h3>
    <div id="detailRepeatBadge" style="display:none" class="repeat-badge">🔁 <span id="detailRepeatText"></span></div>
    <div class="detail-row"><span class="detail-icon">📅</span><span class="detail-label">날짜</span><span class="detail-value" id="detailDate"></span></div>
    <div class="detail-row"><span class="detail-icon">⏰</span><span class="detail-label">시간</span><span class="detail-value" id="detailTime"></span></div>
    <div class="detail-row"><span class="detail-icon">👥</span><span class="detail-label">참석자</span><span class="detail-value" id="detailMembers"></span></div>
    <div class="detail-row"><span class="detail-icon">📝</span><span class="detail-label">메모</span><span class="detail-value" id="detailDesc" style="white-space:pre-wrap"></span></div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal('detailModal')">닫기</button>
      <button class="btn btn-danger" id="deleteBtn" onclick="onDeleteClick()" style="display:none">삭제</button>
      <button class="btn btn-primary" id="editBtn" onclick="startEdit()" style="display:none">수정</button>
    </div>
  </div>
</div>

<script>
// ╔══════════════════════════════════════════════════════╗
// ║  ★ 관리자 전용 설정                                 ║
// ╠══════════════════════════════════════════════════════╣
const DEFAULT_OWNER = 'bluebird1131-spec';
const DEFAULT_REPO  = 'meeting-calendar';
const _T = '';
// ╚══════════════════════════════════════════════════════╝

const _PH = 'e00c1bce5e219f8957f3886f242d0caa69348fcf2fc58678bca9c9f530396aaa';

const PRESET_COLORS=['#EF4444','#F97316','#F59E0B','#84CC16','#22C55E','#14B8A6','#3B82F6','#6366F1','#8B5CF6','#EC4899','#64748B','#1e293b'];
const DAY_NAMES=['일','월','화','수','목','금','토'];
const REPEAT_LABELS={none:'',daily:'매일',weekly:'매주',biweekly:'격주',monthly:'매월',monthly_nth:'매월N번째'};
const NTH_LABELS=['','첫번째','두번째','세번째','네번째'];
const EMOJIS=['','📋','💼','🎯','📊','🔍','💡','🚀','⚡','🤝','📞','🖥️','☕','📌','🏆','🔔','✅','🗓️','💬','🧩','📈','🛠️','🎤','🌐'];

let config={},meetings=[],fileSha=null,currentYear,currentMonth;
let selectedColor=PRESET_COLORS[6],selectedDays=[],selectedEmoji='';
let editingId=null,selectedDetailId=null,selectedDate=null,isUnlocked=false;

const today=new Date();
currentYear=today.getFullYear();
currentMonth=today.getMonth();

function getToken(){return localStorage.getItem('mtcal_tok')||config.token||'';}
function loadConfig(){try{config=JSON.parse(localStorage.getItem('mtcal_v2')||'{}');}catch{config={};}if(DEFAULT_OWNER)config.owner=DEFAULT_OWNER;if(DEFAULT_REPO)config.repo=DEFAULT_REPO;}
function persistConfig(){localStorage.setItem('mtcal_v2',JSON.stringify(config));}

async function sha256hex(str){const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');}

async function tryUnlock(){
  const pw=document.getElementById('unlockInput').value;
  const hash=await sha256hex(pw);
  if(hash!==_PH){document.getElementById('unlockError').style.display='block';document.getElementById('unlockInput').value='';document.getElementById('unlockInput').focus();return;}
  const tokenGroup=document.getElementById('tokenGroup');
  const storedToken=localStorage.getItem('mtcal_tok');
  if(!storedToken){
    tokenGroup.style.display='block';document.getElementById('tokenInput').focus();
    const btn=document.querySelector('#unlockModal .btn-primary');
    btn.textContent='저장 및 활성화';
    btn.onclick=async()=>{const tok=document.getElementById('tokenInput').value.trim();if(!tok){alert('토큰을 입력해주세요.');return;}localStorage.setItem('mtcal_tok',tok);config.token=tok;completeUnlock();};
    return;
  }
  config.token=storedToken;completeUnlock();
}

function completeUnlock(){
  isUnlocked=true;
  document.getElementById('lockBtn').textContent='🔓';
  document.getElementById('lockBtn').title='편집 모드 활성 (클릭하여 잠금)';
  document.getElementById('tokenGroup').style.display='none';
  document.getElementById('unlockInput').value='';
  const btn=document.querySelector('#unlockModal .btn-primary');
  btn.textContent='확인';btn.onclick=tryUnlock;
  closeModal('unlockModal');updateEditUI();showStatus('✅ 편집 모드 활성화','success');
}
function lock(){isUnlocked=false;document.getElementById('lockBtn').textContent='🔒';document.getElementById('lockBtn').title='편집 모드 잠금/해제';updateEditUI();showStatus('🔒 잠금되었습니다.','');}
function onLockClick(){if(isUnlocked){if(confirm('편집 모드를 잠금할까요?'))lock();}else{document.getElementById('unlockInput').value='';document.getElementById('unlockError').style.display='none';document.getElementById('unlockModal').classList.add('show');setTimeout(()=>document.getElementById('unlockInput').focus(),100);}}

function updateEditUI(){
  const canEdit=isUnlocked&&!!getToken();
  document.getElementById('addBtn').style.display=canEdit?'inline-block':'none';
  document.getElementById('settingsBtn').style.display=isUnlocked?'inline-block':'none';
  document.getElementById('readonlyNotice').style.display=(!isUnlocked&&config.owner)?'block':'none';
  const daysEl=document.getElementById('calDays');if(daysEl)renderCalendar();
}

const DATA_FILE='meetings.json';
function apiUrl(){return `https://api.github.com/repos/${config.owner}/${config.repo}/contents/${DATA_FILE}`;}
function apiHeaders(auth){const h={'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'};const tok=getToken();if(auth&&tok)h['Authorization']=`Bearer ${tok}`;return h;}

async function fetchMeetings(){const res=await fetch(apiUrl(),{headers:apiHeaders(true)});if(res.status===404)return null;if(res.status===401||res.status===403)throw new Error('토큰이 유효하지 않거나 권한이 없습니다.');if(!res.ok)throw new Error(`GitHub API 오류 (${res.status})`);const data=await res.json();fileSha=data.sha;return JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\s/g,'')))));}

async function pushMeetings(msg){const tok=getToken();if(!tok)throw new Error('토큰이 설정되지 않았습니다.');const content=btoa(unescape(encodeURIComponent(JSON.stringify(meetings,null,2))));const body={message:msg||'Update meetings',content};if(fileSha)body.sha=fileSha;const res=await fetch(apiUrl(),{method:'PUT',headers:{...apiHeaders(true),'Content-Type':'application/json'},body:JSON.stringify(body)});if(res.status===409){showStatus('⚠️ 충돌 발생 — 새로 불러옵니다.','error');await loadMeetings();throw new Error('충돌 — 다시 시도해주세요');}if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.message||`저장 실패(${res.status})`);}fileSha=(await res.json()).content.sha;}

async function loadMeetings(){if(!config.owner||!config.repo){renderSetupNeeded();return;}showStatus('불러오는 중...');try{const data=await fetchMeetings();if(data===null){meetings=[];await pushMeetings('Initialize meetings.json');showStatus('✅ 새 달력이 생성되었습니다!','success');}else{meetings=Array.isArray(data)?data:[];showStatus('');}renderAll();}catch(e){showStatus('❌ '+e.message,'error');meetings=[];renderAll();}}

function parseDate(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function toDateStr(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function fmtDate(s){const[y,m,d]=s.split('-');return `${y}년 ${+m}월 ${+d}일 (${DAY_NAMES[new Date(+y,+m-1,+d).getDay()]})`;}

function getNthWeekday(year,month,nth,weekday){const first=new Date(year,month,1);const offset=((weekday-first.getDay())+7)%7;const day=1+offset+(nth-1)*7;const dim=new Date(year,month+1,0).getDate();return day<=dim?new Date(year,month,day):null;}

function generateSeriesDates(startDate,repeatType,repeatDays,endDate,repeatNth,repeatNthDay){
  if(repeatType==='none')return[startDate];
  const start=parseDate(startDate);
  const limit=endDate?parseDate(endDate):new Date(start.getFullYear()+1,start.getMonth(),start.getDate());
  const dates=[];
  if(repeatType==='daily'){let d=new Date(start);while(d<=limit&&dates.length<500){dates.push(toDateStr(d));d.setDate(d.getDate()+1);}}
  else if(repeatType==='weekly'){const days=repeatDays.length?repeatDays:[start.getDay()];let d=new Date(start);while(d<=limit&&dates.length<500){if(days.includes(d.getDay()))dates.push(toDateStr(d));d.setDate(d.getDate()+1);}}
  else if(repeatType==='biweekly'){let d=new Date(start);while(d<=limit&&dates.length<200){dates.push(toDateStr(d));d.setDate(d.getDate()+14);}}
  else if(repeatType==='monthly'){let d=new Date(start);while(d<=limit&&dates.length<60){dates.push(toDateStr(d));d.setMonth(d.getMonth()+1);}}
  else if(repeatType==='monthly_nth'){const nth=parseInt(repeatNth)||1;const wd=parseInt(repeatNthDay);let y=start.getFullYear(),m=start.getMonth();while(dates.length<60){const d=getNthWeekday(y,m,nth,wd);if(d&&d>=start&&d<=limit)dates.push(toDateStr(d));if(d&&d>limit)break;m++;if(m>11){m=0;y++;}if(new Date(y,m,1)>limit)break;}}
  return dates;
}

function showStatus(msg,type=''){const bar=document.getElementById('statusBar');bar.textContent=msg;bar.className='status-bar'+(type?' '+type:'');if(type==='success')setTimeout(()=>{if(bar.textContent===msg)showStatus('');},2500);}
function closeModal(id){document.getElementById(id).classList.remove('show');}
function escH(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function renderSetupNeeded(){document.getElementById('addBtn').style.display='none';document.getElementById('readonlyNotice').style.display='none';document.getElementById('mainContent').innerHTML=`<div class="setup-needed"><div style="font-size:3rem;margin-bottom:14px">📋</div><h3>GitHub 저장소 연결 필요</h3><p>🔒 버튼으로 로그인 후 설정에서 연결하세요.</p><button class="btn btn-primary" onclick="onLockClick()">🔐 관리자 로그인</button></div>`;}

function renderAll(){updateEditUI();document.getElementById('mainContent').innerHTML=`<div class="cal-nav"><button class="nav-btn" onclick="prevMonth()">‹</button><h2 id="calTitle"></h2><button class="nav-btn" onclick="nextMonth()">›</button></div><div class="cal-wrap"><div class="cal-header-row"><div style="color:#EF4444">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div style="color:#3B82F6">토</div></div><div class="cal-days" id="calDays"></div></div><div id="dayPanel"></div>`;renderCalendar();}

function renderCalendar(){
  const title=document.getElementById('calTitle');const daysEl=document.getElementById('calDays');if(!title||!daysEl)return;
  title.textContent=`${currentYear}년 ${currentMonth+1}월`;
  const firstDow=new Date(currentYear,currentMonth,1).getDay();
  const daysInMonth=new Date(currentYear,currentMonth+1,0).getDate();
  const daysInPrev=new Date(currentYear,currentMonth,0).getDate();
  const map={};meetings.forEach(m=>{(map[m.date]=map[m.date]||[]).push(m);});
  Object.values(map).forEach(arr=>arr.sort((a,b)=>(a.time||'').localeCompare(b.time||'')));
  let html='';
  for(let i=firstDow-1;i>=0;i--)html+=buildCell(currentYear,currentMonth-1,daysInPrev-i,true,map);
  for(let d=1;d<=daysInMonth;d++)html+=buildCell(currentYear,currentMonth,d,false,map);
  const total=firstDow+daysInMonth;const rem=total%7===0?0:7-total%7;
  for(let d=1;d<=rem;d++)html+=buildCell(currentYear,currentMonth+1,d,true,map);
  daysEl.innerHTML=html;
}

function buildCell(year,month,day,other,map){
  const am=((month%12)+12)%12,ay=year+Math.floor(month/12);
  const ds=`${ay}-${String(am+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  const dow=new Date(ay,am,day).getDay();
  const isToday=!other&&day===today.getDate()&&am===today.getMonth()&&ay===today.getFullYear();
  const ms=map[ds]||[];
  let cls='cal-day'+(other?' other-month':'')+(isToday?' today':'')+(ms.length?' has-events':'')+(ds===selectedDate?' selected-day':'');
  const clickAttr=other?' ':`onclick="openDayList('${ds}')"`;
  const numColor=other?'#CBD5E1':dow===0?'#EF4444':dow===6?'#3B82F6':'#374151';
  const dayNumHtml=isToday?`<div class="day-num"><span class="today-circle">${day}</span></div>`:`<div class="day-num" style="color:${numColor}">${day}</div>`;
  const MAX=6;
  const chips=ms.slice(0,MAX).map(m=>{
    const emo=m.emoji?m.emoji+' ':'';
    const rIcon=m.seriesId?'🔁 ':'';
    const timeStr=m.time?m.time.slice(0,5)+' ':'';
    return `<div class="meeting-chip" style="background:${m.color||'#6366F1'}" onclick="event.stopPropagation();openDetail('${m.id}')">${emo}${rIcon}${timeStr}${escH(m.title)}</div>`;
  }).join('');
  const more=ms.length>MAX?`<div class="more-badge">+${ms.length-MAX}개</div>`:'';
  const dots=ms.slice(0,8).map(m=>`<span class="m-dot" style="background:${m.color||'#6366F1'}"></span>`).join('');
  const dotsHtml=ms.length?`<div class="dots-row">${dots}</div>`:'';
  return `<div class="${cls}" ${clickAttr}>${dayNumHtml}${chips}${more}${dotsHtml}</div>`;
}

function prevMonth(){if(--currentMonth<0){currentMonth=11;currentYear--;}renderCalendar();}
function nextMonth(){if(++currentMonth>11){currentMonth=0;currentYear++;}renderCalendar();}

function openDayList(ds){
  selectedDate=ds;renderCalendar();
  const dayMeetings=meetings.filter(m=>m.date===ds).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const[y,mo,d]=ds.split('-');const dow=DAY_NAMES[new Date(+y,+mo-1,+d).getDay()];
  const canEdit=isUnlocked&&!!getToken();
  const items=dayMeetings.length?dayMeetings.map(m=>{
    const timeStr=m.time?m.time.slice(0,5):'시간 미정';
    let rLabel=REPEAT_LABELS[m.repeatType]||'반복';
    if(m.repeatType==='monthly_nth')rLabel=`매월${NTH_LABELS[m.repeatNth]||''}${DAY_NAMES[m.repeatNthDay]||''}`;
    const repeatBadge=m.seriesId?`<span class="day-list-badge" style="background:#6366F1">🔁 ${rLabel}</span>`:'';
    const emojiEl=m.emoji?`<span class="day-list-emoji">${m.emoji}</span>`:`<span class="day-list-dot" style="background:${m.color||'#6366F1'}"></span>`;
    return `<button class="day-list-item" onclick="openDetail('${m.id}')">
      ${emojiEl}
      <span class="day-list-info">
        <span class="day-list-title">${escH(m.title)}</span>
        <span class="day-list-meta">⏰ ${timeStr}${m.members?' · 👥 '+escH(m.members):''}</span>
      </span>
      ${repeatBadge}
      <span style="color:#CBD5E1;font-size:.9rem">›</span>
    </button>`;
  }).join(''):`<div class="day-panel-empty">📭 등록된 회의가 없습니다.</div>`;
  const addBtn=canEdit?`<button class="day-panel-add" onclick="openAddModal('${ds}')">＋ 회의 추가</button>`:'';
  document.getElementById('dayPanel').innerHTML=`<div class="day-panel"><div class="day-panel-header"><span class="day-panel-date">📅 ${+mo}월 ${+d}일 (${dow})</span>${addBtn}</div>${items}</div>`;
  if(window.innerWidth<=600)document.getElementById('dayPanel').scrollIntoView({behavior:'smooth',block:'start'});
}

// ── Emoji Picker ─────────────────────────────────────────
function renderEmojiPicker(current=''){
  document.getElementById('emojiGrid').innerHTML=EMOJIS.map(e=>{
    const label=e===''?'<span class="emoji-none">없음</span>':e;
    return `<button type="button" class="emoji-btn${e===current?' selected':''}" onclick="selectEmoji('${e}')" title="${e||'없음'}">${label}</button>`;
  }).join('');
}
function selectEmoji(e){
  selectedEmoji=e;
  document.querySelectorAll('.emoji-btn').forEach(btn=>{
    btn.classList.toggle('selected',(btn.title===e)||(e===''&&btn.title==='없음'));
  });
}

// ── Color Picker ─────────────────────────────────────────
function renderColorPicker(){
  document.getElementById('colorRow').innerHTML=
    PRESET_COLORS.map(c=>`<div class="color-swatch${c===selectedColor?' selected':''}" style="background:${c}" onclick="selectColor('${c}')"></div>`).join('')
    +`<input type="color" class="color-custom" id="customColor" value="${selectedColor}" oninput="selectColor(this.value)" title="직접 선택">`;
}
function selectColor(c){selectedColor=c;document.querySelectorAll('.color-swatch').forEach(el=>{el.classList.toggle('selected',rgbToHex(el.style.background)===c.toLowerCase());});const ci=document.getElementById('customColor');if(ci)ci.value=c;}
function rgbToHex(rgb){const m=rgb.match(/\d+/g);if(!m||m.length<3)return rgb;return '#'+m.slice(0,3).map(x=>parseInt(x).toString(16).padStart(2,'0')).join('');}

// ── Repeat UI ─────────────────────────────────────────────
function renderDayBtns(){document.getElementById('dayBtns').innerHTML=DAY_NAMES.map((n,i)=>`<button class="day-btn${selectedDays.includes(i)?' on':''}" onclick="toggleDay(${i})">${n}</button>`).join('');}
function toggleDay(i){selectedDays.includes(i)?selectedDays.splice(selectedDays.indexOf(i),1):selectedDays.push(i);renderDayBtns();}
function onRepeatChange(){const v=document.getElementById('mtRepeat').value;document.getElementById('repeatSection').style.display=v==='none'?'none':'block';document.getElementById('weekdayPicker').style.display=v==='weekly'?'block':'none';document.getElementById('nthPicker').style.display=v==='monthly_nth'?'block':'none';if(v==='weekly')renderDayBtns();}

// ── Add / Edit ────────────────────────────────────────────
function openAddModal(dateStr){
  if(!isUnlocked||!getToken()){showStatus('🔒 편집 모드를 먼저 활성화하세요.','error');return;}
  editingId=null;selectedColor=PRESET_COLORS[6];selectedDays=[];selectedEmoji='';
  document.getElementById('addModalTitle').textContent='회의 추가';
  document.getElementById('mtTitle').value='';
  document.getElementById('mtDate').value=dateStr||toDateStr(today);
  document.getElementById('mtTime').value='';document.getElementById('mtMembers').value='';document.getElementById('mtDesc').value='';
  document.getElementById('mtRepeat').value='none';document.getElementById('mtRepeatEnd').value='';
  document.getElementById('mtRepeat').disabled=false;
  document.getElementById('repeatSection').style.display='none';document.getElementById('weekdayPicker').style.display='none';document.getElementById('nthPicker').style.display='none';
  renderEmojiPicker('');renderColorPicker();
  document.getElementById('addModal').classList.add('show');document.getElementById('mtTitle').focus();
}

function startEdit(){
  const m=meetings.find(x=>x.id===selectedDetailId);if(!m)return;
  closeModal('detailModal');
  editingId=m.id;selectedColor=m.color||PRESET_COLORS[6];selectedDays=m.repeatDays||[];selectedEmoji=m.emoji||'';
  document.getElementById('addModalTitle').textContent='회의 수정 (이 일정만)';
  document.getElementById('mtTitle').value=m.title;document.getElementById('mtDate').value=m.date;
  document.getElementById('mtTime').value=m.time||'';document.getElementById('mtMembers').value=m.members||'';document.getElementById('mtDesc').value=m.description||'';
  document.getElementById('mtRepeat').value='none';document.getElementById('mtRepeat').disabled=!!m.seriesId;
  document.getElementById('repeatSection').style.display='none';document.getElementById('nthPicker').style.display='none';
  renderEmojiPicker(m.emoji||'');renderColorPicker();
  document.getElementById('addModal').classList.add('show');document.getElementById('mtTitle').focus();
}

async function saveMeeting(){
  const title=document.getElementById('mtTitle').value.trim();const date=document.getElementById('mtDate').value;
  if(!title||!date){alert('제목과 날짜는 필수입니다.');return;}
  const btn=document.getElementById('saveBtn');btn.disabled=true;btn.textContent='저장 중...';
  const repeatType=document.getElementById('mtRepeat').value;
  const repeatEnd=document.getElementById('mtRepeatEnd').value||'';
  const repeatNth=document.getElementById('mtNth').value;
  const repeatNthDay=document.getElementById('mtNthDay').value;
  const base={title,date,emoji:selectedEmoji,time:document.getElementById('mtTime').value,color:selectedColor,
    members:document.getElementById('mtMembers').value.trim(),description:document.getElementById('mtDesc').value.trim(),
    repeatType,repeatDays:repeatType==='weekly'?[...selectedDays]:[],repeatEnd,repeatNth:parseInt(repeatNth),repeatNthDay:parseInt(repeatNthDay)};
  const backup=[...meetings];
  try{
    if(editingId){const idx=meetings.findIndex(x=>x.id===editingId);if(idx!==-1)meetings[idx]={...meetings[idx],...base};await pushMeetings(`수정: ${title}`);}
    else if(repeatType==='none'){meetings.push({...base,id:genId(),seriesId:null});await pushMeetings(`추가: ${title}`);}
    else{const dates=generateSeriesDates(date,repeatType,base.repeatDays,repeatEnd,repeatNth,repeatNthDay);const seriesId=genId();dates.forEach(d=>meetings.push({...base,id:genId(),date:d,seriesId}));await pushMeetings(`반복 추가: ${title} (${dates.length}건)`);}
    document.getElementById('mtRepeat').disabled=false;closeModal('addModal');showStatus('✅ 저장되었습니다.','success');renderCalendar();if(selectedDate)openDayList(selectedDate);
  }catch(e){meetings=backup;showStatus('❌ '+e.message,'error');}
  finally{btn.disabled=false;btn.textContent='저장';document.getElementById('mtRepeat').disabled=false;}
}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

// ── Detail ────────────────────────────────────────────────
function openDetail(id){
  const m=meetings.find(x=>x.id===id);if(!m)return;selectedDetailId=id;
  document.getElementById('detailColorBar').style.background=m.color||'#6366F1';
  const emoEl=document.getElementById('detailEmoji');
  if(m.emoji){emoEl.textContent=m.emoji;emoEl.style.display='block';}else emoEl.style.display='none';
  document.getElementById('detailTitle').textContent=m.title;
  const badge=document.getElementById('detailRepeatBadge');
  if(m.seriesId&&m.repeatType&&m.repeatType!=='none'){
    badge.style.display='inline-flex';
    let txt=REPEAT_LABELS[m.repeatType]||'반복';
    if(m.repeatType==='weekly'&&m.repeatDays?.length)txt+=` (${m.repeatDays.map(i=>DAY_NAMES[i]).join('·')})`;
    if(m.repeatType==='monthly_nth')txt=`매월 ${NTH_LABELS[m.repeatNth]||''} ${DAY_NAMES[m.repeatNthDay]||''}요일`;
    document.getElementById('detailRepeatText').textContent=txt;
  }else badge.style.display='none';
  document.getElementById('detailDate').textContent=fmtDate(m.date);
  document.getElementById('detailTime').textContent=m.time||'시간 미정';
  document.getElementById('detailMembers').textContent=m.members||'—';
  document.getElementById('detailDesc').textContent=m.description||'—';
  const canEdit=isUnlocked&&!!getToken();
  document.getElementById('deleteBtn').style.display=canEdit?'inline-block':'none';
  document.getElementById('editBtn').style.display=canEdit?'inline-block':'none';
  document.getElementById('detailModal').classList.add('show');
}

// ── Delete ────────────────────────────────────────────────
function onDeleteClick(){
  const m=meetings.find(x=>x.id===selectedDetailId);if(!m)return;closeModal('detailModal');
  if(!m.seriesId){if(confirm(`"${m.title}" 회의를 삭제할까요?`))doDelete('single');return;}
  document.getElementById('deleteModalDesc').textContent=`"${m.title}" — 반복 일정입니다.`;
  document.getElementById('deleteOptions').innerHTML=[
    {label:'이 일정만 삭제',desc:'선택한 날짜의 일정만 삭제합니다.',fn:'single'},
    {label:'이 날짜 이후 전체 삭제',desc:'이 일정과 이후 모든 반복 일정을 삭제합니다.',fn:'future'},
    {label:'시리즈 전체 삭제',desc:'과거·미래 포함 이 반복 시리즈 전체를 삭제합니다.',fn:'all'},
  ].map(o=>`<button class="delete-opt-btn" onclick="doDelete('${o.fn}')"><strong>${o.label}</strong><span>${o.desc}</span></button>`).join('');
  document.getElementById('deleteModal').classList.add('show');
}

async function doDelete(mode){
  closeModal('deleteModal');const m=meetings.find(x=>x.id===selectedDetailId);if(!m)return;
  const backup=[...meetings];
  try{
    if(mode==='single')meetings=meetings.filter(x=>x.id!==selectedDetailId);
    else if(mode==='future')meetings=meetings.filter(x=>!(x.seriesId===m.seriesId&&x.date>=m.date));
    else meetings=meetings.filter(x=>x.seriesId!==m.seriesId);
    await pushMeetings(`삭제(${mode}): ${m.title}`);showStatus('✅ 삭제되었습니다.','success');renderCalendar();if(selectedDate)openDayList(selectedDate);
  }catch(e){meetings=backup;showStatus('❌ '+e.message,'error');}
}

// ── Settings ──────────────────────────────────────────────
function openSettings(){if(!isUnlocked){showStatus('🔒 설정은 편집 모드에서만 접근 가능합니다.','error');return;}loadConfig();document.getElementById('cfgOwner').value=config.owner||'';document.getElementById('cfgRepo').value=config.repo||'';document.getElementById('settingsModal').classList.add('show');}

async function saveSettings(){
  const owner=document.getElementById('cfgOwner').value.trim();const repo=document.getElementById('cfgRepo').value.trim();
  if(!owner||!repo){alert('사용자명과 저장소 이름은 필수입니다.');return;}
  const btn=document.getElementById('saveSettingsBtn');btn.disabled=true;btn.textContent='연결 중...';
  config={...config,owner,repo};persistConfig();closeModal('settingsModal');await loadMeetings();btn.disabled=false;btn.textContent='저장 및 연결';
}

document.querySelectorAll('.modal-overlay').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('show');}));
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')document.querySelectorAll('.modal-overlay.show').forEach(m=>m.classList.remove('show'));
  if(e.key==='Enter'&&document.getElementById('unlockModal').classList.contains('show'))tryUnlock();
  if(e.key==='Enter'&&document.getElementById('addModal').classList.contains('show'))if(document.activeElement.tagName!=='TEXTAREA')saveMeeting();
});

loadConfig();
if(!config.owner||!config.repo){renderSetupNeeded();}
else loadMeetings();
</script>
</body>
